<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
  <title>조이산업 - 고객문의</title>
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
  <link href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet"/>

  <link href="../components/common.css" rel="stylesheet"/>

<body id="top">

  <div class="page-hero">
    <div class="page-hero-bg-text">Contact</div>
    <div class="page-hero-content"><h1>고객문의</h1></div>
  </div>

  <!-- Contact Info Section -->
  <section class="contact-section">
    <div class="container">
      <div class="contact-header fade-up">
        <h2>조이산업에 연락주세요</h2>
        <p>궁금하신 점이나 문의사항이 있으신 경우 아래 연락처로 편하게 연락주시기 바랍니다.</p>
      </div>
      
      <div class="contact-grid">
        <div class="contact-card fade-up">
          <div class="contact-icon">
            <i class="fas fa-phone"></i>
          </div>
          <h3>전화 문의</h3>
          <p class="contact-value">052-249-9199</p>
          <p class="contact-hours">평일 09:00 ~ 18:00</p>
        </div>

        <div class="contact-card fade-up">
          <div class="contact-icon">
            <i class="fas fa-fax"></i>
          </div>
          <h3>팩스</h3>
          <p class="contact-value">052-249-9250</p>
        </div>

        <div class="contact-card fade-up">
          <div class="contact-icon">
            <i class="fas fa-envelope"></i>
          </div>
          <h3>이메일</h3>
          <p class="contact-value">
            <a href="mailto:joy052@hanmail.net">joy052@hanmail.net</a>
          </p>
        </div>
      </div>
    </div>
  </section>


  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

  <script src="../components/common.js"></script>
