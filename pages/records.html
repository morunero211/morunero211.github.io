            <option value="">전체 기업</option>
            <option value="nav_01">한화임팩트(주)</option>
            <option value="nav_02">한화케미칼(주)</option>

            <option value="nav_07">효성화학(주)</option>
            <option value="nav_08">S-OIL(주)</option>
            <option value="nav_09">태광산업(주)</option>
            <option value="nav_10">현대미포조선(주)</option>
            <option value="nav_11">울산화력</option>
            <option value="nav_12">귀뚜라미범양냉방(주)</option>
            <option value="nav_etc">기타</option>
          </select>
        </div>
      </div>

      <div class="records-display" id="records-display">
        <!-- JavaScript로 동적 렌더링 -->
      </div>
    </div>
  </section>
