<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>조이산업 - 조직도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Noto+Sans+KR:300,400,500,700&display=swap&subset=korean" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link href="components/common.css" rel="stylesheet">
  <style>
body {
  padding-top: var(--navbar-height);
  font-family: Baskerville, "Palatino Linotype", Palatino, "Times New Roman", serif;
}
a { color: var(--color-point1); }

/* 페이지 상단 타이틀 배너 */
.index-video-intro {
  position: relative;
  background-image: linear-gradient(90deg, #20345a 0, #476991 100%);
  padding: 60px 0 30px;
  overflow: hidden;
}
.index-video-intro .bg-text {
  position: absolute;
  font-size: 7rem;
  font-weight: 900;
  color: rgba(255,255,255,0.06);
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  white-space: nowrap;
  letter-spacing: -2px;
  pointer-events: none;
}
.special-features {
  padding: 10px 0 0;
}
.index-video-title h3 {
  color: #fff;
  font-size: 1.6rem;
  font-weight: 600;
}
.index-devices {
  background: #fff;
  padding: 40px 0;
}
.index-devices section {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 15px;
}
.index-devices .devices {
  width: 45%;
  min-width: 250px;
  flex-shrink: 0;
  object-fit: cover;
  border-radius: 20px;
}
.index-devices h4 {
  color: var(--color-point1);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 15px;
}
.index-devices p {
  font-size: 0.95rem;
  line-height: 1.9;
  color: #444;
}

/* 섹션 공통 헤더 배너 */
.pricing-charts-header {
  min-height: 100px;
  background-image: linear-gradient(90deg, #20345a 0, #476991 100%);
  display: flex;
  align-items: center;
}
.pricing-charts-header section {
  padding: 20px 0;
}
.pricing-charts-header h3 {
  color: #fff;
  font-size: 1.4rem;
  font-weight: 600;
  margin: 0;
}

/* 조직도 */
.google-visualization-orgchart-table {
  border-collapse: separate;
  border-spacing: 6px;
}
.google-visualization-orgchart-table td {
  background: #f5f8fa;
  border: 1px solid #b8cfe4 !important;
  border-radius: 4px;
  padding: 6px 12px;
  font-size: 0.9rem;
  white-space: nowrap;
}
#org_chart_content {
  overflow-x: auto;
  padding: 20px 0;
}

/* 사업분야 */
.agency-intro {
  padding: 40px 0;
  border-bottom: 1px solid #eee;
}
.agency-intro:last-child { border-bottom: none; }
.core_tech {
  color: var(--color-point1);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 16px;
}
.core_tech span { vertical-align: middle; margin-right: 6px; }
.product-sub1-list1 {
  font-size: 0.95rem;
  line-height: 2;
  color: #444;
}
.product-sub1-list1 .fa-ul { margin-left: 1.8em; }
.product-item-li { font-size: 0.9rem; color: #555; }
.product-sub1 {
  margin-bottom: 30px;
}
.bs-callout-box {
  background: linear-gradient(90deg, #20345a 0, #476991 100%);
  border-radius: 4px;
  padding: 10px 16px;
  margin-bottom: 12px;
}
.product-sub1-heading {
  color: #fff;
  font-weight: 600;
  font-size: 0.95rem;
}
.product-image {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.product-image img {
  width: 48%;
  border-radius: 4px;
  object-fit: cover;
  max-height: 180px;
}
.apply { color: var(--color-point1); }
#project-showcase { padding: 40px 0; }
#project-showcase h3 {
  color: var(--color-point1);
  font-size: 1.1rem;
  font-weight: 700;
  margin: 30px 0 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--color-point1);
}

/* 고객문의 */
.board-placeholder {
  background: #f8f9fa;
  border: 2px dashed #dee2e6;
  border-radius: 8px;
  padding: 50px 20px;
  text-align: center;
  color: #868e96;
}
.board-placeholder i { font-size: 3rem; margin-bottom: 16px; display: block; }
.board-notice {
  background: #fff3cd;
  border-left: 4px solid #ffc107;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  border-radius: 0 4px 4px 0;
}

/* 실적현황 - 테이블 공통 */
.dropdown-extend-menu { min-width: 500px; padding: 15px; }
.client-tab-link { color: var(--color-point1) !important; font-size: 0.9rem; }
.nav-tabs { border-bottom: 2px solid var(--color-point1); }
.nav-tabs .nav-link {
  color: #555;
  border: 1px solid transparent;
  border-radius: 4px 4px 0 0;
  font-size: 0.9rem;
}
.nav-tabs .nav-link.active {
  background: var(--color-point1);
  color: #fff !important;
  border-color: var(--color-point1);
}
table thead th {
  background: var(--color-point1);
  color: #fff;
  font-weight: 500;
  font-size: 0.85rem;
  white-space: nowrap;
  padding: 8px 10px;
}
table tbody td {
  font-size: 0.85rem;
  padding: 6px 10px;
  vertical-align: middle;
}
table tbody tr:nth-child(even) { background: #f8f9fa; }
.img-fluid { max-width: 100%; height: auto; }

@media (max-width: 768px) {
  .index-devices section { flex-direction: column; }
  .index-devices .devices { width: 100%; }
  .dropdown-extend-menu { min-width: 280px; }
  .index-video-intro .bg-text { font-size: 3.5rem; }
}
  </style>
</head>
